version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/gft-db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_access_key_change_me
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_key_change_me
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis
    restart: always

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo-data:
